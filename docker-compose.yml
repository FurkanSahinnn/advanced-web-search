# Advanced Web Search — containerized deployment.
#
#   docker compose up --build                     # build + run -> http://localhost:8787
#   docker compose --profile ollama up --build    # also run a bundled, offline Ollama
#   docker compose down                           # stop (named volumes are kept)
#
# All configuration is OPTIONAL. Copy .env.example to .env and any keys you set
# there are passed through to the container automatically (the file may be absent).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: advanced-web-search:latest
    container_name: advanced-web-search
    ports:
      - "8787:8787"
    # Optional: pass API keys / overrides from a local .env (ignored if absent).
    env_file:
      - path: .env
        required: false
    environment:
      AWSEARCH_HOST: "0.0.0.0"
      AWSEARCH_PORT: "8787"
      AWSEARCH_DATA_DIR: /data
      # Where to reach an LLM. Defaults to an Ollama running on the HOST machine.
      # To use the bundled "ollama" service below instead, start with
      #   docker compose --profile ollama up
      # and set AWSEARCH_OLLAMA_BASE_URL=http://ollama:11434 (e.g. in .env).
      AWSEARCH_OLLAMA_BASE_URL: ${AWSEARCH_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      # Lets `host.docker.internal` resolve to the host on Linux too
      # (already works on Docker Desktop for Windows/macOS).
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist the SQLite db, embedding-model cache (~hundreds of MB, downloaded
      # on first run) and HTTP cache so they survive container recreation.
      - aws-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Optional fully-offline LLM. Enabled only with the "ollama" profile:
  #   docker compose --profile ollama up -d
  #   docker compose exec ollama ollama pull qwen3:8b   # pull a model once
  # Then point the app at it: AWSEARCH_OLLAMA_BASE_URL=http://ollama:11434
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: advanced-web-search-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # NVIDIA GPU acceleration — uncomment if you have the NVIDIA Container Toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: ["gpu"]

volumes:
  aws-data:
  ollama-models:
