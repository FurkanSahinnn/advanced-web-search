<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Advanced Web Search">
  <defs>
    <filter id="aws-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- subtle lens "glass" tint -->
  <circle cx="104" cy="104" r="61" fill="#5B4BE6" opacity="0.06"/>

  <!-- magnifying glass: handle + lens (monoline, uniform stroke, rounded caps) -->
  <g fill="none" stroke="#5B4BE6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <line x1="150" y1="150" x2="206" y2="206"/>
    <circle cx="104" cy="104" r="68"/>
  </g>

  <!-- agent network: links converging to the focal node -->
  <g stroke="#5B4BE6" stroke-width="6" stroke-linecap="round">
    <line x1="104" y1="104" x2="104" y2="64"/>
    <line x1="104" y1="104" x2="142" y2="92"/>
    <line x1="104" y1="104" x2="128" y2="136"/>
    <line x1="104" y1="104" x2="80" y2="136"/>
    <line x1="104" y1="104" x2="66" y2="92"/>
  </g>

  <!-- outer agent nodes -->
  <g fill="#5B4BE6">
    <circle cx="104" cy="64" r="8"/>
    <circle cx="142" cy="92" r="8"/>
    <circle cx="128" cy="136" r="8"/>
    <circle cx="80" cy="136" r="8"/>
    <circle cx="66" cy="92" r="8"/>
  </g>

  <!-- central focal node (active agent) with glow -->
  <circle cx="104" cy="104" r="13" fill="#22D3EE" filter="url(#aws-glow)"/>
</svg>
